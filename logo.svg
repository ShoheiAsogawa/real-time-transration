<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bubbleTop" x1="20" y1="12" x2="72" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3F7CFF"/>
      <stop offset="1" stop-color="#6A38E6"/>
    </linearGradient>
    <linearGradient id="bubbleBot" x1="52" y1="56" x2="106" y2="104" gradientUnits="userSpaceOnUse">
      <stop stop-color="#23C4FF"/>
      <stop offset="1" stop-color="#2E73FF"/>
    </linearGradient>
    <linearGradient id="arrow" x1="8" y1="8" x2="112" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#36A0FF"/>
      <stop offset="1" stop-color="#1E5BFF"/>
    </linearGradient>
  </defs>

  <!-- circular swap arrows -->
  <g stroke="url(#arrow)" stroke-width="7.5" stroke-linecap="round" fill="none">
    <path d="M70 9 A52 52 0 0 1 112 55"/>
    <path d="M50 111 A52 52 0 0 1 8 65"/>
  </g>
  <path fill="url(#arrow)" d="M112 55 l8 -3 l-10 -7 z"/>
  <path fill="url(#arrow)" d="M8 65 l-8 3 l10 7 z"/>

  <!-- bottom-right bubble (あ) -->
  <path fill="url(#bubbleBot)"
    d="M67 55 H91 a15 15 0 0 1 15 15 V83 a15 15 0 0 1 -15 15 H80 l-3 12 l-10 -12 H67 a15 15 0 0 1 -15 -15 V70 a15 15 0 0 1 15 -15 Z"/>
  <text x="79" y="86" text-anchor="middle" fill="#fff"
    font-family="'Hiragino Sans','Yu Gothic UI',sans-serif" font-size="30" font-weight="700">あ</text>

  <!-- top-left bubble (A) -->
  <path fill="url(#bubbleTop)"
    d="M33 13 H57 a15 15 0 0 1 15 15 V41 a15 15 0 0 1 -15 15 H42 l-10 12 l0 -12 H33 a15 15 0 0 1 -15 -15 V28 a15 15 0 0 1 15 -15 Z"/>
  <text x="45" y="45" text-anchor="middle" fill="#fff"
    font-family="-apple-system,'SF Pro Display',Arial,sans-serif" font-size="30" font-weight="800">A</text>
</svg>
