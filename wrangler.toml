name = "lingualive-realtime-translator"
compatibility_date = "2026-06-07"
pages_build_output_dir = "."

[[kv_namespaces]]
binding = "SESSION_KV"
id = "c4c6e1d7b1b241e2be88f39cf8cff915"
preview_id = "c4c6e1d7b1b241e2be88f39cf8cff915"


[vars]
# カンマ区切りでログインを許可するアクセスID（一般ユーザー用）
ALLOWED_LOGIN_IDS = "user1,user2"
# シードユーザー（ALLOWED_LOGIN_IDS）の初期パスワードハッシュ（npm run hash-password -- <PASSWORD>）
SEED_USER_PASSWORD_HASH = "100000:9ef51164921ca81a5a7e1b32b8b434f3:9c3d25891f6e8c6072fe100479e4f0032a66fe4fe6c9183e17a2bd4137061f40"
# 管理画面ログイン（本番では ADMIN_PASSWORD_HASH を secret で上書きすること）
ADMIN_EMAIL = "admin@lingualive.local"
ADMIN_PASSWORD_HASH = "100000:5249adba9d8262a7ece249fc646bcd88:03f60ebcef08a074621d70a9548d13fa41668b9b104222c35f221d0b742d91f0"
# 本番: SESSION_SECRET / PASSWORD_PEPPER を wrangler secret で設定（KV漏洩時のハッシュ保護）
# PASSWORD_MAX_ATTEMPTS = "5"
