name = "lingualive-realtime-translator"
compatibility_date = "2026-06-07"
pages_build_output_dir = "."

[[kv_namespaces]]
binding = "SESSION_KV"
id = "c4c6e1d7b1b241e2be88f39cf8cff915"
preview_id = "c4c6e1d7b1b241e2be88f39cf8cff915"

[[d1_databases]]
binding = "DB"
database_name = "lingualive-b2b-usage"
database_id = "00000000-0000-0000-0000-000000000000"

[vars]
# ── シードユーザー（一般ユーザー） ──────────────────────────────────────────
# カンマ区切りでログインを許可するアクセスID（管理画面で削除不可）
ALLOWED_LOGIN_IDS = "user1,user2"

# シードユーザーの初期パスワードハッシュ（npm run hash-password -- <PASSWORD>）
# 本番では wrangler secret put SEED_USER_PASSWORD_HASH で上書きすること
SEED_USER_PASSWORD_HASH = "100000:9ef51164921ca81a5a7e1b32b8b434f3:9c3d25891f6e8c6072fe100479e4f0032a66fe4fe6c9183e17a2bd4137061f40"

# ── 管理者 ──────────────────────────────────────────────────────────────────
ADMIN_EMAIL = "uken.shohei@gmail.com"

# 管理者パスワードハッシュ（npm run hash-password -- <PASSWORD>）
# 本番では wrangler secret put ADMIN_PASSWORD_HASH で上書きすること
ADMIN_PASSWORD_HASH = "100000:44ca2153394a3d3249790347b31c8bf5:3c3015f1475d1c4068dae93d0d2d0b8bb9ea912c42735086f64a46240545e856"

# ── 本番 secrets（wrangler secret put で設定） ───────────────────────────────
# SESSION_SECRET   … セッションCookie署名用ランダム文字列（32バイト以上）
# PASSWORD_PEPPER  … KV漏洩時のパスワードハッシュ追加保護（省略可）

# ── オプション ───────────────────────────────────────────────────────────────
# OPENAI_REALTIME_MODEL = "gpt-realtime"
# PASSWORD_MAX_ATTEMPTS = "5"
# AUTH_MAX_ATTEMPTS     = "8"
# AUTH_WINDOW_MS        = "900000"
