<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <title>AMALINK Translation</title>
    <meta
      name="description"
      content="AMALINK Translation — 招待ID制の多言語リアルタイム翻訳Webアプリ。"
    />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <!-- ───────── ログイン ───────── -->
      <section class="auth-view user-auth-view" id="authView" aria-labelledby="loginTitle">
        <div class="user-auth-card">
          <div class="auth-hero">
          <div class="app-icon" aria-hidden="true">
            <svg width="80" height="80" viewBox="0 0 120 120" fill="none">
              <defs>
                <linearGradient id="bubbleTop" x1="20" y1="12" x2="72" y2="60" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#3F7CFF" />
                  <stop offset="1" stop-color="#6A38E6" />
                </linearGradient>
                <linearGradient id="bubbleBot" x1="52" y1="56" x2="106" y2="104" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#23C4FF" />
                  <stop offset="1" stop-color="#2E73FF" />
                </linearGradient>
                <linearGradient id="arrow" x1="8" y1="8" x2="112" y2="112" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#36A0FF" />
                  <stop offset="1" stop-color="#1E5BFF" />
                </linearGradient>
              </defs>
              <g stroke="url(#arrow)" stroke-width="7.5" stroke-linecap="round" fill="none">
                <path d="M70 9 A52 52 0 0 1 112 55" />
                <path d="M50 111 A52 52 0 0 1 8 65" />
              </g>
              <path fill="url(#arrow)" d="M112 55 l8 -3 l-10 -7 z" />
              <path fill="url(#arrow)" d="M8 65 l-8 3 l10 7 z" />
              <path fill="url(#bubbleBot)" d="M67 55 H91 a15 15 0 0 1 15 15 V83 a15 15 0 0 1 -15 15 H80 l-3 12 l-10 -12 H67 a15 15 0 0 1 -15 -15 V70 a15 15 0 0 1 15 -15 Z" />
              <text x="79" y="86" text-anchor="middle" fill="#fff" font-family="'Hiragino Sans','Yu Gothic UI',sans-serif" font-size="30" font-weight="700">あ</text>
              <path fill="url(#bubbleTop)" d="M33 13 H57 a15 15 0 0 1 15 15 V41 a15 15 0 0 1 -15 15 H42 l-10 12 l0 -12 H33 a15 15 0 0 1 -15 -15 V28 a15 15 0 0 1 15 -15 Z" />
              <text x="45" y="45" text-anchor="middle" fill="#fff" font-family="-apple-system,'SF Pro Display',Arial,sans-serif" font-size="30" font-weight="800">A</text>
            </svg>
          </div>
          <h1 id="loginTitle">AMALINK <span class="brand-accent">Translation</span></h1>
          <p class="auth-subtitle">話すだけで多言語をリアルタイム翻訳</p>
        </div>

        <div class="auth-form-area">
          <form class="form-group" id="loginForm" autocomplete="off">
            <div class="form-row">
              <label for="accessId">アクセスID</label>
              <div class="input-with-action">
                <input
                  id="accessId"
                  name="accessId"
                  inputmode="text"
                  autocapitalize="none"
                  spellcheck="false"
                  autocomplete="username"
                  required
                />
                <button class="input-action-btn" id="pasteAccessId" type="button" title="クリップボードから貼り付け">貼り付け</button>
              </div>
            </div>
            <div class="form-row form-row-separator">
              <label for="accessPassword">パスワード</label>
              <div class="password-field">
                <input
                  id="accessPassword"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  required
                />
                <button class="password-toggle" id="accessPasswordToggle" type="button" aria-label="パスワードを表示">
                  <svg class="icon-show" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="2"/>
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                  </svg>
                  <svg class="icon-hide" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M3 3l18 18M10.6 10.6a2 2 0 002.8 2.8M6.7 6.7C4.9 8 3.5 9.8 2 12c1.8 3.2 5.4 7 10 7 1.7 0 3.3-.5 4.7-1.3M9.9 5.1A10.7 10.7 0 0112 5c4.6 0 8.2 3.8 10 7a11.2 11.2 0 01-4.1 4.6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                </button>
              </div>
            </div>
            <p class="form-message" id="authMessage" role="status"></p>
            <div class="form-row form-row-submit">
              <button class="app-button primary" id="loginSubmit" type="submit">ログイン</button>
            </div>
          </form>
          <p class="auth-footer">AMALINK Translation</p>
        </div>
        </div>
      </section>

      <!-- ───────── 翻訳（一般ユーザー） ───────── -->
      <main class="translator-view is-hidden" id="translatorView">
        <header class="nav-bar">
          <span class="nav-spacer" aria-hidden="true"></span>
          <h2 class="nav-title">AMALINK <span>Translation</span></h2>
          <div class="nav-actions">
            <button class="nav-icon-button" id="historyButton" type="button" aria-label="履歴">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
                <path d="M12 7v5l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </header>

        <div class="live-pill-wrap">
          <div class="live-pill" id="livePill">
            <span class="live-dot"></span>
            <span id="connectionState">待機中</span>
          </div>
        </div>

        <div class="history-banner is-hidden" id="historyBanner" role="status">
          <span>過去の会話を表示中</span>
          <button class="history-banner-btn" id="resumeLiveBtn" type="button">新しい翻訳を開始</button>
        </div>

        <div class="mic-bar mic-bar-partner" id="partnerMicBar">
          <p class="mic-hint" id="partnerMicHint">マイクボタンをタップして話してください</p>
          <button class="mic-fab" id="partnerMicButton" type="button" aria-pressed="false" aria-describedby="partnerMicHint">
            <span class="mic-fab-rings" aria-hidden="true">
              <span class="mic-ring"></span>
              <span class="mic-ring"></span>
              <span class="mic-ring"></span>
            </span>
            <span class="mic-fab-core">
              <svg class="icon-mic" width="30" height="30" viewBox="0 0 24 24" fill="none">
                <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor" />
                <path d="M5 11a7 7 0 0014 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <path d="M12 18v3M9 21h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
              <svg class="icon-stop" width="26" height="26" viewBox="0 0 24 24" fill="none">
                <rect x="6" y="6" width="12" height="12" rx="3" fill="currentColor" />
              </svg>
            </span>
            <span class="mic-level" id="partnerMicLevel" aria-hidden="true"></span>
          </button>
        </div>

        <div class="dual-panel" id="dualPanel" aria-live="polite">
          <section class="panel panel-partner" id="partnerPanel">
            <header class="panel-header">
              <span class="panel-badge panel-badge-partner">相手向け</span>
              <span class="panel-lang" id="partnerLangLabel">English</span>
            </header>
            <div class="panel-body">
              <p class="panel-text" id="partnerText">
                <span class="panel-placeholder">向かい合った相手が見て聞く言葉がここに表示されます</span>
              </p>
            </div>
          </section>

          <section class="panel panel-self" id="selfPanel">
            <header class="panel-header">
              <span class="panel-badge panel-badge-self">自分向け</span>
              <span class="panel-lang" id="selfLangLabel">日本語</span>
            </header>
            <div class="panel-body">
              <p class="panel-text" id="selfText">
                <span class="panel-placeholder">自分が見て聞く言葉がここに表示されます</span>
              </p>
            </div>
          </section>
        </div>

        <div class="chat-list is-hidden" id="chatList" aria-live="polite"></div>

        <div class="mic-bar mic-bar-self" id="micBar">
          <p class="mic-hint" id="micHint">マイクボタンをタップして話してください</p>
          <button class="mic-fab" id="micButton" type="button" aria-pressed="false" aria-describedby="micHint">
            <span class="mic-fab-rings" aria-hidden="true">
              <span class="mic-ring"></span>
              <span class="mic-ring"></span>
              <span class="mic-ring"></span>
            </span>
            <span class="mic-fab-core">
              <svg class="icon-mic" width="30" height="30" viewBox="0 0 24 24" fill="none">
                <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor" />
                <path d="M5 11a7 7 0 0014 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <path d="M12 18v3M9 21h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
              <svg class="icon-stop" width="26" height="26" viewBox="0 0 24 24" fill="none">
                <rect x="6" y="6" width="12" height="12" rx="3" fill="currentColor" />
              </svg>
            </span>
            <span class="mic-level" id="micLevel" aria-hidden="true"></span>
          </button>
          <span class="visually-hidden" id="micLabel">タップして開始</span>
        </div>

        <audio id="remoteAudio" autoplay playsinline></audio>
      </main>

      <!-- ───────── 履歴ドロワー ───────── -->
      <div class="drawer-overlay" id="drawerOverlay" hidden></div>
      <aside class="drawer" id="drawer" aria-label="翻訳履歴">
        <div class="drawer-header">
          <h3>履歴</h3>
          <button class="nav-icon-button" id="drawerClose" type="button" aria-label="閉じる">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <button class="new-conv-button" id="newConversationButton" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          新しい会話
        </button>
        <div class="session-list" id="sessionList"></div>
        <section class="drawer-settings" aria-label="翻訳設定">
          <h4 class="drawer-settings-title">翻訳設定</h4>
          <label class="setting-row">
            <span class="setting-label">長押しで話す（PTT）</span>
            <input class="setting-toggle" id="pushToTalkToggle" type="checkbox" />
          </label>
          <div class="setting-row setting-row-select">
            <label class="setting-label" for="langSelfSelect">自分向け（下）</label>
            <select class="setting-select" id="langSelfSelect"></select>
          </div>
          <div class="setting-row setting-row-select">
            <label class="setting-label" for="langPartnerSelect">相手向け（上）</label>
            <select class="setting-select" id="langPartnerSelect"></select>
          </div>
        </section>
        <button class="settings-link" id="changePasswordBtn" type="button">パスワードを変更</button>
        <button class="logout-link" id="logoutButton" type="button">ログアウト</button>
      </aside>

      <!-- パスワード変更 -->
      <div class="password-overlay is-hidden" id="passwordOverlay" role="dialog" aria-modal="true" aria-labelledby="passwordDialogTitle">
        <div class="password-dialog">
          <h3 id="passwordDialogTitle">パスワードを変更</h3>
          <p class="password-dialog-desc" id="passwordDialogDesc">新しいパスワードを設定してください。</p>
          <form class="password-change-form" id="passwordChangeForm" autocomplete="off">
            <div class="form-row">
              <label for="currentPassword">現在のパスワード</label>
              <input id="currentPassword" name="currentPassword" type="password" autocomplete="current-password" required />
            </div>
            <div class="form-row">
              <label for="newPassword">新しいパスワード</label>
              <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" minlength="8" placeholder="8文字以上" required />
            </div>
            <div class="form-row">
              <label for="confirmPassword">新しいパスワード（確認）</label>
              <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required />
            </div>
            <p class="form-message" id="passwordChangeMessage" role="status"></p>
            <div class="password-dialog-actions">
              <button class="app-button secondary is-hidden" id="passwordCancelBtn" type="button">キャンセル</button>
              <button class="app-button primary" id="passwordSubmitBtn" type="submit">変更する</button>
            </div>
          </form>
          <button class="password-logout-link is-hidden" id="passwordLogoutBtn" type="button">ログアウト</button>
        </div>
      </div>

      <!-- トースト -->
      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="script.js" type="module"></script>
  </body>
</html>
